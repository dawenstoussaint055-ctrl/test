services:
  - type: web
    name: inconnu-xd-v3
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SESSION_ID
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: OWNER_NUMBER
        sync: false
      - key: OWNER_NAME
        sync: false
      - key: BOT_NAME
        value: INCONNU XD V3
      - key: PREFIX
        value: "."
      - key: LANGUAGE
        value: en
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
        
